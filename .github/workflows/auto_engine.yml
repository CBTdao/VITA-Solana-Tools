name: 100M_Asset_Engine  # 自动化赚钱引擎

on:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小时全自动运行一次
  workflow_dispatch:      # 支持手动点击运行测试

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install requests schedule

      - name: Execute Engine
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          # 这里可以添加更多 API 密钥
        run: python main.py
